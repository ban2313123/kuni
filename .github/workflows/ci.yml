name: CI Build (CMake + AUI + Cache + Artifacts)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            ninja-build \
            curl \
            ccache \
            g++-14

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Download latest AUI Boot script
        run: |
          mkdir -p build
          curl -L -o build/aui.boot.cmake \
            https://raw.githubusercontent.com/aui-framework/aui/master/aui.boot.cmake

      - name: Create dummy secrets.h
        run: |
          mkdir -p build/secrets
          cat > build/secrets/secrets.h << 'EOF'
          namespace secrets {
              static constexpr auto TELEGRAM_API_ID = 0;
              static constexpr auto TELEGRAM_API_HASH = "00000000000000000000000000000000";
              static constexpr auto DEEPSEEK_BEARER_KEY = "";
              static constexpr auto OLLAMA_BEARER_KEY = "";
          }
          EOF

      - name: Configure CMake
        env:
          CC: gcc-14
          CXX: g++-14
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build project
        run: cmake --build build --config Release

      - name: Build tests
        run: cmake --build build --target Tests

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Upload kuni binary
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: kuni-linux-x64
          path: build/kuni
          if-no-files-found: error
          retention-days: 30
